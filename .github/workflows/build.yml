name: Build WPF App

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore KPL-FE/KPL-FE.csproj

      - run: dotnet publish KPL-FE/KPL-FE.csproj -c Release -o publish -r win-x64 --self-contained false

      - uses: actions/upload-artifact@v4
        with:
          name: KPL-FE
          path: publish/

      - run: dotnet publish KPL-FE/KPL-FE.csproj -c Release -o publish-single -r win-x64 --self-contained false -p:PublishSingleFile=true -p:DebugType=none

      - uses: actions/upload-artifact@v4
        with:
          name: KPL-FE-single
          path: publish-single/KPL-FE.exe
